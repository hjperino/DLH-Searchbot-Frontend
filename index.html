        * {

:root{

        .chat-container {

        .chat-header .logo {

        }

            padding: 15px 20px;

}

.suggested-question {

        /* (Ende Layout-Stile) */

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;

        }

        .message {

        }
        .message.user {

        }

        .message-bubble {

<script>
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatMessages = document.getElementById("chatMessages");
    const resetButton = document.getElementById("resetButton");
    const suggestedQuestionsContainer = document.getElementById("suggestedQuestionsContainer");
    const initialChatHtml = chatMessages ? chatMessages.innerHTML : "";
    // ========== SETTINGS (NEU) =============
    const API_URL = "https://dlh-chatbot-api-openai.onrender.com";
    // Admin password lives ONLY on the server now (env var ADMIN_TOKEN on
    // Render). The frontend prompts the operator for it at runtime, stores
    // it in sessionStorage as "admin_token", and sends it on save requests
    // via the X-Admin-Token header. No secret is shipped in this file.
    // =====================================

    let lastQuestionAnswer = {};
    // Speichert den Conversation-State aus dem Backend (Follow-ups etc.)
    let conversationState = null;
	// NEU: stabile Session-ID pro Browser (muss vor sendMessage existieren!)
    let sessionId = localStorage.getItem("dlh_session_id");
    if (!sessionId) {
    sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + "-" + Math.random());
    localStorage.setItem("dlh_session_id", sessionId);
}
    // Admin-Status beim Laden wiederherstellen — Token (kein Klartext-Flag mehr).
    // Migration: alten "isEditor"-Eintrag aufräumen, falls noch vorhanden.
    sessionStorage.removeItem("isEditor");
    window.adminModeActive = !!sessionStorage.getItem("admin_token");
	function appendMessage(sender, text, htmlContent = null) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`; // "user" oder "bot"

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";

    if (htmlContent) {
        bubble.innerHTML = htmlContent;
    } else {
        bubble.textContent = text;
    }

    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return msgDiv;
    }

    // Returns the admin token string (from sessionStorage, or a fresh
    // prompt that's validated against the backend before activation),
    // or null if the user cancelled or entered the wrong password.
    async function ensureEditor() {
        let token = sessionStorage.getItem("admin_token");
        if (token) {
            window.adminModeActive = true;
            return token;
        }
        token = window.prompt("Admin-Passwort eingeben:");
        if (!token) return null;

        // Validate the token against the backend BEFORE activating
        // admin mode in the UI. Avoids the previous confusing state
        // where a wrong password silently "worked" until the first
        // save attempt revealed the 403.
        const cleanBaseUrl = API_URL.endsWith('/') ? API_URL.slice(0, -1) : API_URL;
        try {
            const res = await fetch(`${cleanBaseUrl}/admin/check-token`, {
                method: 'POST',
                headers: { 'X-Admin-Token': token },
            });
            if (res.ok) {
                sessionStorage.setItem("admin_token", token);
                window.adminModeActive = true;
                return token;
            }
            if (res.status === 403) {
                alert("❌ Ungültiges Admin-Passwort.");
                return null;
            }
            if (res.status === 503) {
                alert("Der Server hat ADMIN_TOKEN nicht konfiguriert. " +
                      "In Render → Settings → Environment ergänzen.");
                return null;
            }
            alert("Admin-Validierung fehlgeschlagen (HTTP " + res.status + ").");
            return null;
        } catch (err) {
            console.error("Netzwerkfehler bei Admin-Validierung:", err);
            alert("Netzwerkfehler bei der Validierung des Admin-Passworts.");
            return null;
        }
    }

    async function saveAnswerToBin(question, answerHtml, saveButton) {
        const token = await ensureEditor();
        if (!token) return;

        // Keywords filtern um Überflutung zu vermeiden

function formatBotMessage(message, sources = []) {
  if (!message) return "";
  const trimmed = message.trim();

  // WICHTIG: Wenn Backend schon fertiges HTML liefert, direkt rendern
  if (trimmed.startsWith("<section")) {
    return trimmed;
  }

  // Sonst: Plaintext/Markdown minimal formatieren
  let t = escapeHtml(message);
  t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

  const lines = t.split("\n");
  let out = [];
  let inList = false;

  for (const raw of lines) {
    const line = raw.trimEnd();
    const m = line.match(/^\-\s+(.*)$/);
    if (m) {
      if (!inList) { out.push("<ul>"); inList = true; }
      out.push(`<li>${m[1]}</li>`);
      continue;
    }
    if (inList) { out.push("</ul>"); inList = false; }
    if (line.trim() === "") out.push("</p><p>");
    else out.push(line);
  }

  if (inList) out.push("</ul>");
  return `<section class='dlh-answer'><p>${linkify(out.join("\n"))}</p></section>`;
}

    function cleanHtmlLinks(html) {
        const div = document.createElement("div");
        div.innerHTML = html;
        div.querySelectorAll("a").forEach(a => {
            const href = a.getAttribute("href");
            const text = (a?.textContent || href || "").trim();
            a.textContent = text;
            a.setAttribute("href", href);
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener noreferrer");
        });
        return div.innerHTML;
    }

    function escapeHtml(str) {
        return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s<]+)/g, `<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>`);
    }

    function looksLikeHtml(s) {
        const t = (s || "").trim();
        return t.startsWith("<") && t.endsWith(">");
    }

    function renderSources(sources) {
        if (!Array.isArray(sources) || sources.length === 0) return "";
        const items = sources.filter(s => s && s.url).map(s => {
            const title = (s.title || s.url).trim();
            const url = s.url.trim();
            return `<li><a href="${url}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a></li>`;
        }).join("");
        return `<h3>Quellen</h3><ul class="sources">${items}</ul>`;
    }

    function stripSourcesFromHtml(html) {
        const div = document.createElement("div");
        div.innerHTML = html;
        div.querySelectorAll("h3, h4").forEach(h => {
            if (!h.closest('.fixed-link') && (h.textContent || "").trim().toLowerCase() === "quellen") {
                const next = h.nextElementSibling;
                h.remove();
                if (next && next.matches("ul.sources, ul.source, ul")) next.remove();
            }
        });
        div.querySelectorAll("ul.sources").forEach(ul => {
            if (!ul.closest('.fixed-link')) ul.remove();
        });
        return div.innerHTML;
    }

function addMessageToChat(message, sender, isError = false, isLoading = false) {
    if (!chatMessages) return; // Guard: ohne Container keinen Chat

    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${sender}`;

    const messageBubble = document.createElement("div");
    messageBubble.className = "message-bubble";

    // Fokus-Karte entfernen, sobald die erste echte Bot-Antwort kommt
    if (sender === "bot" && !isLoading && !isError) {
        document.getElementById("fokusCard")?.remove();
    }

    if (isError) {
        messageBubble.className += " error";
        messageBubble.innerHTML = String(message ?? "");
    } else if (isLoading) {
        messageBubble.className += " loading";
        messageBubble.textContent = String(message ?? "");
    } else if (sender === "bot") {
        try {
            const cleaned = stripSourcesFromHtml(String(message ?? ""));
            const formatted = formatBotMessage(cleaned, []);
            messageBubble.innerHTML = formatted;
        } catch (e) {
            console.error("Bot formatting failed", e);
            messageBubble.textContent = String(message ?? "");
        }
    } else {
        messageBubble.textContent = String(message ?? "");
    }

    messageDiv.appendChild(messageBubble);

    // Admin Save Button (falls aktiv)
    if (sender === "bot" && !isLoading && !isError && window.adminModeActive) {
        if (!messageBubble.textContent.includes("Admin-Modus aktiviert")) {
            const saveBtn = document.createElement("button");

            };
            messageDiv.appendChild(saveBtn);

    chatMessages.appendChild(messageDiv);
